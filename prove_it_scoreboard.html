<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Prove It! — Mountain Climbing Grammar Game</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
    background: #1a1a2e; color: #eee;
    height: 100vh; overflow: hidden;
    display: flex; flex-direction: column;
  }

  /* ── Header ── */
  .header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 10px 24px; background: #16213e; border-bottom: 2px solid #0f3460;
    flex-shrink: 0;
  }
  .title { font-size: 26px; font-weight: 700; color: #e8c547; letter-spacing: 1px; }
  .group-tabs { display: flex; gap: 6px; }
  .group-tab {
    padding: 6px 16px; border-radius: 20px; border: 2px solid transparent;
    cursor: pointer; font-size: 14px; font-weight: 600;
    background: rgba(255,255,255,0.08); color: #aaa; transition: all 0.2s;
  }
  .group-tab:hover { background: rgba(255,255,255,0.15); }
  .group-tab.active { color: #fff; border-color: currentColor; }
  .group-tab .tab-turns { font-size: 11px; opacity: 0.7; margin-left: 4px; }
  .group-tab.completed-tab { opacity: 0.7; }
  .group-tab.completed-tab::after { content: " ⛰"; }
  .header-right { display: flex; gap: 10px; align-items: center; }
  .hdr-btn {
    padding: 6px 14px; border-radius: 6px; border: 1px solid #444;
    background: rgba(255,255,255,0.06); color: #ccc; cursor: pointer;
    font-size: 13px; transition: background 0.2s;
  }
  .hdr-btn:hover { background: rgba(255,255,255,0.14); }

  /* ── Setup screen ── */
  .setup-screen {
    display: flex; flex-direction: column; align-items: center;
    justify-content: center; flex: 1; gap: 28px;
  }
  .setup-screen h2 { font-size: 32px; color: #e8c547; }
  .setup-screen p { color: #aaa; font-size: 16px; }
  .group-count-picker { display: flex; gap: 12px; }
  .group-count-btn {
    width: 64px; height: 64px; border-radius: 12px; border: 2px solid #444;
    background: rgba(255,255,255,0.06); color: #eee; font-size: 28px;
    font-weight: 700; cursor: pointer; transition: all 0.2s;
  }
  .group-count-btn:hover { border-color: #e8c547; background: rgba(232,197,71,0.1); }

  /* ── Main layout ── */
  .main { display: flex; flex: 1; overflow: hidden; }
  .col-mountain { width: 35%; min-width: 280px; position: relative; padding: 16px; display: flex; align-items: center; justify-content: center; }
  .col-stage { width: 65%; padding: 24px 32px; display: flex; flex-direction: column; overflow-y: auto; }

  /* ── Mountain SVG ── */
  .mountain-wrap { width: 100%; height: 100%; position: relative; }
  .mountain-wrap svg { width: 100%; height: 100%; }

  /* ── Stage panel ── */
  .stage-header { margin-bottom: 16px; }
  .stage-label { font-size: 13px; color: #e8c547; text-transform: uppercase; letter-spacing: 2px; font-weight: 600; }
  .stage-title { font-size: 28px; font-weight: 700; margin-top: 4px; }
  .stage-subtitle { font-size: 15px; color: #999; margin-top: 4px; }

  .turn-counter {
    display: inline-flex; align-items: center; gap: 8px;
    padding: 6px 14px; border-radius: 8px; background: rgba(255,255,255,0.06);
    font-size: 14px; color: #ccc; margin-bottom: 20px;
  }
  .turn-counter strong { color: #e8c547; font-size: 18px; }

  /* ── Reference chips (now clickable) ── */
  .ref-chips { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 20px; }
  .ref-chip {
    padding: 10px 18px; border-radius: 8px; border: 2px solid #444;
    background: rgba(255,255,255,0.04); font-size: 16px; color: #bbb;
    cursor: pointer; transition: all 0.15s; font-weight: 600;
  }
  .ref-chip:hover { border-color: #e8c547; background: rgba(232,197,71,0.08); color: #eee; }

  /* ── Identify feedback ── */
  .identify-feedback {
    padding: 16px 20px; border-radius: 10px; margin-bottom: 16px;
    font-size: 18px; font-weight: 600;
  }
  .identify-feedback.correct { background: rgba(29,158,117,0.15); border: 1px solid #1d9e75; color: #4cd9a0; }
  .identify-feedback.incorrect { background: rgba(192,57,43,0.15); border: 1px solid #c0392b; color: #e88; }
  .override-btn {
    padding: 8px 18px; border-radius: 8px; border: 1px solid #555;
    background: rgba(255,255,255,0.06); color: #999; cursor: pointer;
    font-size: 13px; transition: all 0.2s; margin-top: 12px;
  }
  .override-btn:hover { background: rgba(255,255,255,0.12); color: #ccc; border-color: #888; }

  /* ── Committed answers status bar ── */
  .committed-answers { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 16px; }
  .committed-chip {
    padding: 6px 14px; border-radius: 8px; font-size: 13px; font-weight: 600;
    display: flex; align-items: center; gap: 6px;
  }
  .committed-chip .chip-label { color: #888; font-weight: 400; }
  .committed-chip.phrase-type { background: rgba(55,138,221,0.12); border: 1px solid rgba(55,138,221,0.4); color: #6ab0f3; }
  .committed-chip.function { background: rgba(213,83,126,0.12); border: 1px solid rgba(213,83,126,0.4); color: #e88aaf; }
  .committed-chip.overridden { font-style: italic; opacity: 0.8; }
  .committed-chip.overridden::after { content: " (override)"; font-size: 11px; color: #999; font-style: italic; }

  /* ── Action buttons ── */
  .actions { display: flex; gap: 12px; flex-wrap: wrap; margin-top: 16px; }
  .act-btn {
    padding: 14px 32px; border-radius: 10px; border: none;
    font-size: 18px; font-weight: 700; cursor: pointer;
    transition: transform 0.1s, filter 0.15s; color: #fff;
  }
  .act-btn:hover { filter: brightness(1.15); }
  .act-btn:active { transform: scale(0.97); }
  .btn-correct { background: #1d9e75; }
  .btn-incorrect { background: #c0392b; }
  .btn-tryagain { background: #d4880f; }
  .btn-approve { background: #1d9e75; }
  .btn-reject { background: #c0392b; }

  /* ── Test card ── */
  .test-card {
    padding: 20px 24px; border-radius: 12px; border: 1px solid #2a5a3a;
    background: rgba(29,158,117,0.08); margin-bottom: 16px;
  }
  .test-card h3 { font-size: 20px; color: #4cd9a0; margin-bottom: 6px; }
  .test-card .test-desc { font-size: 15px; color: #bbb; line-height: 1.5; }
  .test-card .test-example { font-size: 14px; color: #999; margin-top: 8px; font-style: italic; }
  .tests-used { font-size: 13px; color: #666; margin-top: 8px; }

  /* ── Tree drawing ── */
  .tree-input-area { margin-bottom: 12px; }
  .tree-input-area label { font-size: 14px; color: #999; display: block; margin-bottom: 6px; }
  .tree-input-area textarea {
    width: 100%; height: 80px; border-radius: 8px; border: 1px solid #444;
    background: #111; color: #eee; padding: 10px; font-family: "Fira Code", "Consolas", monospace;
    font-size: 15px; resize: vertical;
  }
  .tree-input-area textarea:focus { outline: none; border-color: #e8c547; }
  .canvas-wrap {
    border: 1px solid #333; border-radius: 8px; background: #fff;
    min-height: 60px; overflow-x: auto; display: inline-block;
    min-width: 100%; box-sizing: border-box;
  }
  .canvas-wrap canvas { display: block; }
  .parse-error { color: #e74c3c; font-size: 13px; margin-top: 4px; min-height: 18px; }

  /* ── Sentence card display ── */
  .sentence-card {
    margin-bottom: 20px; padding: 18px 22px; border-radius: 12px;
    background: rgba(138,103,205,0.1); border: 1px solid rgba(138,103,205,0.3);
  }
  .sentence-card .card-label {
    font-size: 11px; color: #a07ed6; text-transform: uppercase;
    letter-spacing: 1.5px; margin-bottom: 8px; display: flex;
    align-items: center; justify-content: space-between;
  }
  .sentence-card .card-label .difficulty { color: #e8c547; letter-spacing: 0; }
  .sentence-card .sentence-text { font-size: 24px; font-weight: 500; line-height: 1.4; color: #eee; }
  .sentence-card .sentence-text .underlined { text-decoration: underline; text-decoration-color: #e8c547; text-underline-offset: 4px; text-decoration-thickness: 2px; }
  .sentence-card .identify-label { font-size: 14px; color: #aaa; margin-top: 8px; }
  .no-sentence { color: #666; font-style: italic; margin-bottom: 20px; }
  .draw-card-btn {
    padding: 12px 28px; border-radius: 10px; border: 2px solid #a07ed6;
    background: rgba(138,103,205,0.12); color: #c9b3e8; font-size: 16px;
    font-weight: 600; cursor: pointer; transition: all 0.2s; margin-bottom: 20px;
  }
  .draw-card-btn:hover { background: rgba(138,103,205,0.25); border-color: #c9b3e8; }

  /* ── Summit celebration ── */
  .summit-panel { text-align: center; padding: 40px 0; }
  .summit-panel h2 { font-size: 36px; color: #e8c547; margin-bottom: 8px; }
  .summit-panel .summit-turns { font-size: 22px; color: #aaa; }

  /* ── Review mode ── */
  .review-nav { display: flex; gap: 8px; justify-content: center; margin: 24px 0 16px; flex-wrap: wrap; }
  .review-nav-btn {
    padding: 8px 16px; border-radius: 8px; border: 1px solid #444;
    background: rgba(255,255,255,0.06); color: #aaa; cursor: pointer;
    font-size: 13px; font-weight: 600; transition: all 0.2s;
  }
  .review-nav-btn:hover { background: rgba(255,255,255,0.12); color: #eee; }
  .review-nav-btn.active-review { border-color: #e8c547; color: #e8c547; background: rgba(232,197,71,0.1); }
  .review-section {
    text-align: left; padding: 20px 24px; border-radius: 12px;
    background: rgba(255,255,255,0.04); border: 1px solid #333; margin-top: 12px;
  }
  .review-section h3 { font-size: 18px; color: #e8c547; margin-bottom: 10px; }
  .review-item { font-size: 15px; color: #ccc; padding: 4px 0; }
  .review-item .review-label { color: #888; }
  .review-back-btn {
    margin-top: 20px; padding: 8px 20px; border-radius: 8px; border: 1px solid #444;
    background: rgba(255,255,255,0.06); color: #ccc; cursor: pointer;
    font-size: 14px; transition: all 0.2s;
  }
  .review-back-btn:hover { background: rgba(255,255,255,0.12); }

  /* ── Leaderboard overlay ── */
  .lb-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.7);
    display: flex; align-items: center; justify-content: center; z-index: 100;
  }
  .lb-overlay.hidden { display: none; }
  .lb-card {
    background: #1a1a2e; border: 2px solid #0f3460; border-radius: 16px;
    padding: 32px 40px; min-width: 400px; max-width: 90vw;
  }
  .lb-card h2 { font-size: 24px; color: #e8c547; margin-bottom: 16px; text-align: center; }
  .lb-row {
    display: flex; align-items: center; gap: 12px; padding: 10px 0;
    border-bottom: 1px solid rgba(255,255,255,0.06); font-size: 18px;
  }
  .lb-row:last-child { border-bottom: none; }
  .lb-rank { width: 32px; text-align: center; color: #e8c547; font-weight: 700; }
  .lb-name { flex: 1; }
  .lb-stat { color: #999; font-size: 15px; }
  .lb-close {
    display: block; margin: 20px auto 0; padding: 8px 24px;
    border-radius: 8px; border: 1px solid #444; background: transparent;
    color: #ccc; cursor: pointer; font-size: 14px;
  }
  .lb-close:hover { background: rgba(255,255,255,0.08); }
</style>
</head>
<body>

<!-- ═══ Setup screen ═══ -->
<div class="setup-screen" id="setupScreen">
  <h2>Prove It!</h2>
  <p>A Cooperative Phrase-Identification Game</p>
  <div class="group-count-picker" id="groupPicker"></div>
</div>

<!-- ═══ Game screen ═══ -->
<div id="gameScreen" style="display:none; flex-direction:column; flex:1; overflow:hidden;">
  <div class="header">
    <div class="title">Prove It!</div>
    <div class="group-tabs" id="groupTabs"></div>
    <div class="header-right">
      <button class="hdr-btn" onclick="addNextGroup()">+ Next Group</button>
      <button class="hdr-btn" onclick="showLeaderboard()">Leaderboard</button>
      <button class="hdr-btn" onclick="resetGame()">Reset</button>
    </div>
  </div>
  <div class="main">
    <div class="col-mountain" id="colMountain"></div>
    <div class="col-stage" id="colStage"></div>
  </div>
</div>

<!-- ═══ Leaderboard overlay ═══ -->
<div class="lb-overlay hidden" id="lbOverlay" onclick="if(event.target===this)closeLB()">
  <div class="lb-card">
    <h2>Leaderboard</h2>
    <div id="lbBody"></div>
    <button class="lb-close" onclick="closeLB()">Close</button>
  </div>
</div>

<script>
/* ════════════════════════════════════════
   Constants
   ════════════════════════════════════════ */
const STAGES = [
  { key: "identifyPhrase", label: "Camp 1", title: "Identify Phrase Type", type: "identify" },
  { key: "provePhrase",    label: "Camp 2", title: "Prove Phrase Type",    type: "prove" },
  { key: "identifyFunc",   label: "Camp 3", title: "Identify Syntactic Function", type: "identify" },
  { key: "proveFunc",      label: "Camp 4", title: "Prove Syntactic Function",    type: "prove" },
  { key: "drawTree",       label: "Summit", title: "Draw Syntax Tree",    type: "tree" },
];

const PHRASE_TYPES = ["NP", "VP", "AdjP", "AdvP", "PP"];

const FUNCTIONS = [
  "Subject", "Direct Object", "Indirect Object", "Prep. Object",
  "Subject Predicate", "Object Predicate", "VP-Adverbial", "S-Adverbial",
  "Modifier", "Complement", "Head"
];

const TESTS = [
  { name: "Proform Substitution",
    desc: "Replace the phrase with an appropriate proform. Pronoun for NPs (he, she, it, they); proverb for VPs (do so, do the same); proadverb for AdvPs (thus, so); deictic for PPs (here/there, then). If the sentence stays grammatical with the same meaning, the phrase is a constituent.",
    example: "NP: The tall man → He | VP: ran quickly → did so | AdvP: very quickly → thus | PP: in the garden → there",
    proves: ["NP", "VP", "AdvP", "PP"] },
  { name: "Movement",
    desc: "Move the phrase to the front or another position in the sentence. If the result is grammatical, the phrase is a constituent.",
    example: "She read the book quickly → Quickly, she read the book",
    proves: ["constituency"] },
  { name: "Passivization",
    desc: "Turn the sentence from active to passive voice (or vice versa). If the phrase can become the subject of a passive, it's likely a direct object NP.",
    example: "The cat caught the mouse → The mouse was caught by the cat",
    proves: ["Direct Object", "Indirect Object", "Prep. Object"] },
  { name: "Coordination",
    desc: "Conjoin the phrase with another phrase of the same type using 'and' or 'or'. If the result is grammatical, both are the same type of constituent.",
    example: "the big dog and the small cat → both NPs",
    proves: ["phrase type (confirms same type)"] },
  { name: "Omission",
    desc: "Remove the phrase from the sentence. If the sentence remains grammatical, the phrase is likely an adjunct/modifier rather than a complement.",
    example: "She sang beautifully → She sang",
    proves: ["VP-Adverbial", "S-Adverbial", "Modifier (if grammatical)", "Complement (if ungrammatical)"] },
  { name: "Agreement",
    desc: "Check whether the phrase triggers subject-verb agreement. If changing its number changes the verb form, it's likely the subject NP.",
    example: "The dog runs / The dogs run → 'the dog(s)' is the subject",
    proves: ["Subject", "NP"] },
  { name: "Topicalisation",
    desc: "Move the phrase to the front of the sentence to make it the topic. If grammatical, the phrase is a constituent.",
    example: "I like this book → This book, I like",
    proves: ["constituency"] },
  { name: "Do-so replacement",
    desc: "Replace a VP with 'do so'. If the sentence stays grammatical, the replaced part is a VP constituent.",
    example: "John ate the cake and Mary did so too",
    proves: ["VP"] },
  { name: "Question formation",
    desc: "Form a question that targets the phrase using who, what, where, when, how. If you can question it, it's a constituent with a specific function.",
    example: "She saw the cat → What did she see?",
    proves: ["constituency", "function (by question word)"] },
];

const SENTENCES = [
  { sentence: "The students found the answer.", phrase: "the answer", phraseType: "NP", function: "Direct Object", difficulty: 1, notes: "Substitute proform: found it. Passivize: The answer was found." },
  { sentence: "She left quickly.", phrase: "quickly", phraseType: "AdvP", function: "VP-Adverbial", difficulty: 1, notes: "Omit: She left. Still grammatical → optional → adverbial." },
  { sentence: "The old cat slept on the mat.", phrase: "on the mat", phraseType: "PP", function: "VP-Adverbial", difficulty: 1, notes: "Omit: The old cat slept. Still grammatical → adverbial. Cannot passivize: *The mat was slept on." },
  { sentence: "They seemed very happy.", phrase: "very happy", phraseType: "AdjP", function: "Subject Predicate", difficulty: 1, notes: "Cannot omit: *They seemed. Cannot passivize. Describes the subject they." },
  { sentence: "He gave her the book.", phrase: "her", phraseType: "NP", function: "Indirect Object", difficulty: 1, notes: "Passivize: She was given the book. Can rephrase with to: gave the book to her." },
  { sentence: "The rabbit planted carrots.", phrase: "The rabbit", phraseType: "NP", function: "Subject", difficulty: 1, notes: "Agreement: The rabbits planted carrots (verb changes). Tag: …didn't it?" },
  { sentence: "The pig from Mars left relatively early.", phrase: "from Mars", phraseType: "PP", function: "Modifier (inside NP)", difficulty: 2, notes: "Modifies pig, not the VP. Substitute proform for the whole NP: It left. The PP is part of the NP, not a separate adverbial." },
  { sentence: "Fortunately, she found it easily.", phrase: "Fortunately", phraseType: "AdvP", function: "S-Adverbial", difficulty: 2, notes: "Omit: She found it easily. Still grammatical. Expresses speaker's attitude about the whole sentence, not the VP." },
  { sentence: "He referred to that article.", phrase: "to that article", phraseType: "PP", function: "Prepositional Object", difficulty: 2, notes: "Cannot omit: *He referred. Passivize: That article was referred to. → object, not adverbial." },
  { sentence: "The students considered the problem difficult.", phrase: "difficult", phraseType: "AdjP", function: "Object Predicate", difficulty: 2, notes: "Cannot omit: *The students considered the problem. Describes the object the problem." },
  { sentence: "A very curious red book was found.", phrase: "very curious", phraseType: "AdjP", function: "Modifier (inside NP)", difficulty: 2, notes: "Modifies the head noun book. Coordinate: A very curious and extremely old book. Sister to N'." },
  { sentence: "Wisely, they left before dark.", phrase: "Wisely", phraseType: "AdvP", function: "S-Adverbial", difficulty: 2, notes: "Two readings: (1) they were wise to leave (S-adv) or (2) they left in a wise manner (VP-adv). Sentence-initial + comma → S-adverbial." },
  { sentence: "A teacher of physics from England won the prize.", phrase: "of physics", phraseType: "PP", function: "Complement (inside NP)", difficulty: 3, notes: "Cannot reverse: *a teacher from England of physics. One-substitution: a teacher of physics from England → one from England. Sister to N." },
  { sentence: "A teacher of physics from England won the prize.", phrase: "from England", phraseType: "PP", function: "Modifier (inside NP)", difficulty: 3, notes: "Can reverse only after complement. One-substitution: one from England replaces teacher of physics. Sister to N'." },
  { sentence: "The attack on the conclusions of that report shocked everyone.", phrase: "on the conclusions of that report", phraseType: "PP", function: "Complement (inside NP)", difficulty: 3, notes: "Attack is verb-like (cf. attacked the conclusions). The PP = what was attacked. Sister to N." },
  { sentence: "She spotted the man with the binoculars.", phrase: "with the binoculars", phraseType: "PP", function: "AMBIGUOUS", difficulty: 3, notes: "Two trees: (1) PP modifies man (sister to N') → the man who has binoculars; (2) PP is VP-adverbial (sister to V') → she used binoculars to spot him." },
  { sentence: "He hides behind the pile of books on his desk.", phrase: "on his desk", phraseType: "PP", function: "Modifier (inside NP)", difficulty: 3, notes: "Modifies pile, not hides. If VP-adverbial, it would mean he hides ON his desk. Sister to N'." },
  { sentence: "The blatantly illegal plan worried the extremely cautious professor of linguistics.", phrase: "blatantly illegal", phraseType: "AdjP", function: "Modifier (inside NP)", difficulty: 3, notes: "Modifies plan. blatantly is AdvP modifier to Adj head illegal. The AdjP is sister to N'." },
];

const GROUP_COLORS = ["#378ADD","#D85A30","#1D9E75","#D4537E","#9B59B6","#E8C547"];

/* ════════════════════════════════════════
   State
   ════════════════════════════════════════ */
let state = null; // { groups: [...], activeGroupIndex, view }

function newGroupState(i) {
  return {
    name: "Group " + (i + 1),
    color: GROUP_COLORS[i],
    stageIndex: 0,
    turns: 0,
    currentTestIdx: null,
    testsUsed: [],
    bracketInput: "",
    sentenceIdx: null,
    lastAnswer: null,
    lastAnswerCorrect: null,
    proveOutcome: null,
    proveClaimed: false,
    proveHistory: [],
    committedPhraseType: null,
    committedPhraseTypeOverride: false,
    committedFunction: null,
    committedFunctionOverride: false,
    provePhraseFinalHistory: [],
    proveFuncFinalHistory: [],
    reviewStage: null,
    completed: false,
  };
}

function save() {
  localStorage.setItem("proveItMountain", JSON.stringify(state));
}

function loadState() {
  try {
    const d = JSON.parse(localStorage.getItem("proveItMountain"));
    if (d && d.groups && d.groups.length) { state = d; return true; }
  } catch(e) {}
  return false;
}

/* ════════════════════════════════════════
   Setup screen
   ════════════════════════════════════════ */
function initSetup() {
  // No picker needed — just a start button
  const picker = document.getElementById("groupPicker");
  picker.innerHTML = "";
  const btn = document.createElement("button");
  btn.className = "group-count-btn";
  btn.style.width = "auto";
  btn.style.padding = "16px 32px";
  btn.style.fontSize = "20px";
  btn.textContent = "Start Game";
  btn.onclick = () => startNewGame();
  picker.appendChild(btn);
}

function startNewGame() {
  state = {
    groups: [newGroupState(0)],
    activeGroupIndex: 0,
    usedSentences: [],
    view: "game",
  };
  save();
  showGame();
}

function addNextGroup() {
  const i = state.groups.length;
  state.groups.push(newGroupState(i));
  state.activeGroupIndex = i;
  save();
  render();
}

function showSetup() {
  document.getElementById("setupScreen").style.display = "flex";
  document.getElementById("gameScreen").style.display = "none";
}

function showGame() {
  document.getElementById("setupScreen").style.display = "none";
  const gs = document.getElementById("gameScreen");
  gs.style.display = "flex";
  render();
}

/* ════════════════════════════════════════
   Render orchestrator
   ════════════════════════════════════════ */
function render() {
  renderTabs();
  renderMountain();
  renderStage();
  save();
}

/* ════════════════════════════════════════
   Group tabs
   ════════════════════════════════════════ */
function renderTabs() {
  const c = document.getElementById("groupTabs");
  c.innerHTML = "";
  state.groups.forEach((g, i) => {
    const btn = document.createElement("button");
    btn.className = "group-tab" + (i === state.activeGroupIndex ? " active" : "") + (g.completed ? " completed-tab" : "");
    btn.style.color = i === state.activeGroupIndex ? g.color : "";
    btn.style.borderColor = i === state.activeGroupIndex ? g.color : "transparent";
    btn.innerHTML = g.name + '<span class="tab-turns">' + g.turns + "T</span>";
    btn.onclick = () => { state.activeGroupIndex = i; render(); };
    c.appendChild(btn);
  });
}

/* ════════════════════════════════════════
   Mountain SVG
   ════════════════════════════════════════ */
const CAMP_POSITIONS = [
  { x: 60, y: 390 },   // Camp 1 (base)
  { x: 100, y: 310 },  // Camp 2
  { x: 170, y: 240 },  // Camp 3
  { x: 230, y: 170 },  // Camp 4
  { x: 220, y: 80 },   // Summit (Camp 5 / Draw tree)
];

function renderMountain() {
  const c = document.getElementById("colMountain");

  const svgNS = "http://www.w3.org/2000/svg";
  const svg = document.createElementNS(svgNS, "svg");
  svg.setAttribute("viewBox", "0 0 340 440");
  svg.setAttribute("preserveAspectRatio", "xMidYMid meet");

  // Defs: mountain gradient
  const defs = document.createElementNS(svgNS, "defs");
  const grad = document.createElementNS(svgNS, "linearGradient");
  grad.id = "mtnGrad"; grad.setAttribute("x1","0"); grad.setAttribute("y1","1");
  grad.setAttribute("x2","0"); grad.setAttribute("y2","0");
  const stops = [
    { offset: "0%", color: "#2d5a27" },
    { offset: "40%", color: "#3a7233" },
    { offset: "70%", color: "#7a8a72" },
    { offset: "90%", color: "#c8c8c8" },
    { offset: "100%", color: "#f0f0f0" },
  ];
  stops.forEach(s => {
    const st = document.createElementNS(svgNS, "stop");
    st.setAttribute("offset", s.offset);
    st.setAttribute("stop-color", s.color);
    grad.appendChild(st);
  });
  defs.appendChild(grad);
  svg.appendChild(defs);

  // Sky
  const sky = document.createElementNS(svgNS, "rect");
  sky.setAttribute("width","340"); sky.setAttribute("height","440");
  sky.setAttribute("fill","#1a1a2e");
  svg.appendChild(sky);

  // Mountain silhouette
  const mtn = document.createElementNS(svgNS, "polygon");
  mtn.setAttribute("points", "0,430 70,410 140,350 200,260 220,80 260,200 300,310 340,430");
  mtn.setAttribute("fill", "url(#mtnGrad)");
  svg.appendChild(mtn);

  // Snow cap
  const snow = document.createElementNS(svgNS, "polygon");
  snow.setAttribute("points", "195,130 220,80 245,135 230,140 210,135");
  snow.setAttribute("fill", "#f4f4f4"); snow.setAttribute("opacity","0.7");
  svg.appendChild(snow);

  // Climbing path (dashed)
  const pathD = "M 60,390 Q 70,350 100,310 Q 130,270 170,240 Q 200,215 230,170 Q 235,130 220,80";
  const trail = document.createElementNS(svgNS, "path");
  trail.setAttribute("d", pathD);
  trail.setAttribute("fill", "none");
  trail.setAttribute("stroke", "rgba(255,255,255,0.3)");
  trail.setAttribute("stroke-width", "2");
  trail.setAttribute("stroke-dasharray", "6,4");
  svg.appendChild(trail);

  // Camp markers
  CAMP_POSITIONS.forEach((pos, i) => {
    const g = document.createElementNS(svgNS, "g");

    if (i < 4) {
      // Tent icon
      const tent = document.createElementNS(svgNS, "polygon");
      const tx = pos.x, ty = pos.y;
      tent.setAttribute("points", `${tx},${ty-10} ${tx-8},${ty+4} ${tx+8},${ty+4}`);
      tent.setAttribute("fill", "rgba(232,197,71,0.5)");
      tent.setAttribute("stroke", "#e8c547");
      tent.setAttribute("stroke-width", "1");
      g.appendChild(tent);
    } else {
      // Summit flag
      const pole = document.createElementNS(svgNS, "line");
      pole.setAttribute("x1", pos.x); pole.setAttribute("y1", pos.y - 20);
      pole.setAttribute("x2", pos.x); pole.setAttribute("y2", pos.y + 5);
      pole.setAttribute("stroke", "#e8c547"); pole.setAttribute("stroke-width", "2");
      g.appendChild(pole);
      const flag = document.createElementNS(svgNS, "polygon");
      flag.setAttribute("points", `${pos.x},${pos.y-20} ${pos.x+14},${pos.y-14} ${pos.x},${pos.y-8}`);
      flag.setAttribute("fill", "#e8c547");
      g.appendChild(flag);
    }

    // Label
    const label = document.createElementNS(svgNS, "text");
    label.setAttribute("x", pos.x + 14);
    label.setAttribute("y", pos.y + 2);
    label.setAttribute("font-size", "11");
    label.setAttribute("fill", "rgba(255,255,255,0.6)");
    label.setAttribute("font-family", "sans-serif");
    label.textContent = STAGES[i].label;
    g.appendChild(label);

    svg.appendChild(g);
  });

  // Climbers
  state.groups.forEach((grp, gi) => {
    const si = grp.completed ? 4 : grp.stageIndex;
    const pos = CAMP_POSITIONS[si];
    const isActive = gi === state.activeGroupIndex;
    const r = isActive ? 9 : 5;
    const offsetX = (gi - (state.groups.length - 1) / 2) * (isActive ? 4 : 8);

    const circle = document.createElementNS(svgNS, "circle");
    circle.setAttribute("cx", pos.x + offsetX);
    circle.setAttribute("cy", pos.y - 16 - (isActive ? 4 : 0));
    circle.setAttribute("r", r);
    circle.setAttribute("fill", grp.color);
    circle.setAttribute("stroke", "#fff");
    circle.setAttribute("stroke-width", isActive ? "2" : "1");
    circle.setAttribute("opacity", isActive ? "1" : "0.5");
    svg.appendChild(circle);
  });

  c.innerHTML = "";
  c.appendChild(svg);
}

/* ════════════════════════════════════════
   Stage rendering
   ════════════════════════════════════════ */
function renderStage() {
  const c = document.getElementById("colStage");
  const g = state.groups[state.activeGroupIndex];

  if (g.completed) {
    let html = '<div class="summit-panel">' +
      '<h2>Summit Reached!</h2>' +
      '<div class="summit-turns">' + g.name + ' finished in <strong>' + g.turns + '</strong> turns</div>';

    // Review navigation
    html += '<div class="review-nav">';
    STAGES.forEach((st, si) => {
      const isActive = g.reviewStage === si;
      html += '<button class="review-nav-btn' + (isActive ? ' active-review' : '') +
        '" onclick="setReviewStage(' + si + ')">' + st.label + '</button>';
    });
    html += '<button class="review-nav-btn" onclick="clearReviewStage()">Summary</button>';
    html += '</div>';

    // Review content
    if (g.reviewStage !== undefined && g.reviewStage !== null) {
      html += renderReviewStage(g, g.reviewStage);
    }

    html += '</div>';
    c.innerHTML = html;

    // If reviewing tree stage, redraw
    if (g.reviewStage === 4 && g.bracketInput) {
      drawTree(g.bracketInput);
    }
    return;
  }

  const stage = STAGES[g.stageIndex];
  let html = '<div class="stage-header">' +
    '<div class="stage-label">' + stage.label + ' — Stage ' + (g.stageIndex + 1) + ' of 5</div>' +
    '<div class="stage-title">' + stage.title + '</div>' +
    '</div>' +
    '<div class="turn-counter">Turns: <strong>' + g.turns + '</strong></div>';

  html += renderCommittedAnswers(g);

  // Sentence card display
  if (g.sentenceIdx !== null) {
    const s = SENTENCES[g.sentenceIdx];
    const stars = "\u2605".repeat(s.difficulty) + "\u2606".repeat(3 - s.difficulty);
    const highlighted = s.sentence.replace(s.phrase, '<span class="underlined">' + s.phrase + '</span>');
    html += '<div class="sentence-card">' +
      '<div class="card-label"><span>Sentence Card</span><span class="difficulty">' + stars + '</span></div>' +
      '<div class="sentence-text">' + highlighted + '</div>' +
      '<div class="identify-label">Identify: <strong>' + s.phrase + '</strong></div>' +
      '</div>';
  } else {
    html += '<button class="draw-card-btn" onclick="drawSentenceCard()">Draw Sentence Card</button>';
  }

  if (stage.type === "identify") {
    html += renderIdentifyStage(g);
  } else if (stage.type === "prove") {
    html += renderProveStage(g);
  } else if (stage.type === "tree") {
    html += renderTreeStage(g);
  }

  c.innerHTML = html;

  // Post-render hooks — restore focus to phrase input if it was focused
  if (stage.type === "tree") {
    const ta = document.getElementById("bracketInput");
    if (ta) {
      ta.value = g.bracketInput || "";
      ta.addEventListener("input", onBracketInput);
      drawTree(g.bracketInput || "");
    }
  }
}

/* ── Committed answers status ── */
function renderCommittedAnswers(g) {
  let html = '<div class="committed-answers">';
  if (g.committedPhraseType) {
    html += '<div class="committed-chip phrase-type' + (g.committedPhraseTypeOverride ? ' overridden' : '') + '">' +
      '<span class="chip-label">Phrase Type:</span> ' + g.committedPhraseType + '</div>';
  }
  if (g.committedFunction) {
    html += '<div class="committed-chip function' + (g.committedFunctionOverride ? ' overridden' : '') + '">' +
      '<span class="chip-label">Function:</span> ' + g.committedFunction + '</div>';
  }
  html += '</div>';
  // Only return if there's something to show
  return (g.committedPhraseType || g.committedFunction) ? html : '';
}

/* ── Identify stage ── */
function renderIdentifyStage(g) {
  const isPhrase = g.stageIndex === 0;
  const chips = isPhrase ? PHRASE_TYPES : FUNCTIONS;
  const chipLabel = isPhrase ? "What phrase type is it?" : "What syntactic function does it have?";

  let html = '<div class="stage-subtitle">' +
    (isPhrase
      ? "The group identifies the phrase type of the underlined phrase."
      : "The group identifies the syntactic function of the phrase.") +
    '</div>';

  // Show feedback if an answer was just given
  if (g.lastAnswer !== undefined && g.lastAnswer !== null) {
    const s = SENTENCES[g.sentenceIdx];
    const correctAnswer = isPhrase ? s.phraseType : s.function;
    const isCorrect = g.lastAnswerCorrect;
    if (isCorrect) {
      html += '<div class="identify-feedback correct">Correct! The answer is ' + correctAnswer + '.</div>';
      html += '<div class="actions"><button class="act-btn btn-correct" onclick="advanceStage()">Proceed</button></div>';
      html += '<button class="override-btn" onclick="overrideIncorrect()">Override: mark as incorrect (card error)</button>';
      return html;
    } else {
      html += '<div class="identify-feedback incorrect">Incorrect — you chose "' +
        g.lastAnswer + '". The expected answer is ' + correctAnswer + '. Lost a turn.</div>';
      html += '<div class="actions"><button class="act-btn btn-incorrect" onclick="clearAnswer()">Try Again</button></div>';
      html += '<button class="override-btn" onclick="overrideCorrect()">Override: accept answer as correct (card error)</button>';
      return html;
    }
  }

  html += '<div style="font-size:14px;color:#999;margin:14px 0 8px;">' + chipLabel + '</div>';
  html += '<div class="ref-chips">';
  chips.forEach(ch => {
    html += '<div class="ref-chip" onclick="submitIdentify(\'' + ch.replace(/'/g, "\\'") + '\')">' + ch + '</div>';
  });
  html += '</div>';
  return html;
}

/* ── Prove stage ── */
const PROVE_OUTCOMES = [
  { key: "not-applicable", label: "Not Applicable", color: "#666" },
  { key: "positive",       label: "Positive",       color: "#1d9e75" },
  { key: "negative",       label: "Negative",       color: "#c0392b" },
];

function renderProveStage(g) {
  // Initialise prove history if missing
  if (!g.proveHistory) g.proveHistory = [];

  // Assign test if needed
  if (g.currentTestIdx === null) {
    assignRandomTest(g);
    save();
  }

  const test = TESTS[g.currentTestIdx];
  const usedCount = g.testsUsed.length;

  const isProvePhrase = g.stageIndex === 1;
  const claimLabel = isProvePhrase ? g.committedPhraseType : g.committedFunction;
  let html = '<div class="stage-subtitle">' +
    (isProvePhrase
      ? "Apply the assigned test to prove the phrase type."
      : "Apply the assigned test to prove the syntactic function.") +
    '</div>';
  if (claimLabel) {
    html += '<div style="margin:8px 0 14px;padding:10px 16px;border-radius:8px;' +
      'background:rgba(232,197,71,0.08);border:1px solid rgba(232,197,71,0.3);' +
      'font-size:15px;color:#e8c547;">' +
      (isProvePhrase
        ? 'You need to prove this is <strong>' + claimLabel + '</strong> — not just that it\'s a phrase.'
        : 'You need to prove the function is <strong>' + claimLabel + '</strong> — not just identify the phrase type.') +
      '</div>';
  }

  // Show history of tests so far this stage
  if (g.proveHistory.length > 0) {
    html += '<div style="margin-bottom:12px;">';
    html += '<div style="font-size:12px;color:#666;margin-bottom:6px;text-transform:uppercase;letter-spacing:1px;">Evidence so far</div>';
    g.proveHistory.forEach(h => {
      const color = h.result === "positive" ? "#1d9e75" : h.result === "negative" ? "#c0392b" : "#666";
      const symbol = h.result === "positive" ? "+" : h.result === "negative" ? "−" : "○";
      html += '<div style="font-size:13px;color:' + color + ';padding:2px 0;">' + symbol + ' ' + h.testName + '</div>';
    });
    html += '</div>';
  }

  // If students claimed "proven" — show confirmation for instructor
  if (g.proveClaimed) {
    html += '<div class="test-card" style="border-color:#e8c547;background:rgba(232,197,71,0.08);">' +
      '<h3 style="color:#e8c547;">Group claims: Proven!</h3>' +
      '<div class="test-desc" style="color:#bbb;">They believe they have enough evidence. Do you agree?</div>' +
      '</div>';
    html += '<div class="actions">' +
      '<button class="act-btn btn-correct" onclick="proveAcceptClaim()">Accept — Proceed</button>' +
      '<button class="act-btn btn-incorrect" onclick="proveRejectClaim()">Reject — Need More Evidence</button>' +
      '</div>';
    return html;
  }

  html += '<div class="test-card">' +
    '<h3>' + test.name + '</h3>' +
    '<div class="test-desc">' + test.desc + '</div>' +
    '<div class="test-example">Example: ' + test.example + '</div>' +
    '<div style="margin-top:8px;font-size:13px;color:#4cd9a0;">Can prove: ' + test.proves.join(', ') + '</div>' +
    '</div>';

  html += '<div class="tests-used">Tests used this stage: ' + usedCount + ' / ' + TESTS.length + '</div>';

  // Show feedback if outcome was just chosen
  if (g.proveOutcome !== null && g.proveOutcome !== undefined) {
    if (g.proveOutcome === "positive") {
      html += '<div class="identify-feedback correct">Positive result.</div>';
      html += '<div class="actions">' +
        '<button class="act-btn btn-correct" onclick="proveClaimDone()">We\'ve Proven It</button>' +
        '<button class="act-btn btn-tryagain" style="background:#d4880f;" onclick="proveNextTest()">Draw Another Test</button>' +
        '</div>';
      html += '<button class="override-btn" onclick="proveUndoOutcome()">Undo: change this outcome</button>';
    } else if (g.proveOutcome === "negative") {
      html += '<div class="identify-feedback incorrect">Negative result — lost a turn.</div>';
      html += '<div class="actions">' +
        '<button class="act-btn btn-correct" onclick="proveClaimDone()">We\'ve Proven It Anyway</button>' +
        '<button class="act-btn btn-tryagain" style="background:#d4880f;" onclick="proveNextTest()">Draw Another Test</button>' +
        '</div>';
      html += '<button class="override-btn" onclick="proveUndoOutcome()">Undo: change this outcome</button>';
    } else if (g.proveOutcome === "not-applicable") {
      html += '<div class="identify-feedback" style="background:rgba(255,255,255,0.06);border:1px solid #555;color:#aaa;">Test not applicable — draw another.</div>';
      html += '<div class="actions">' +
        '<button class="act-btn btn-tryagain" style="background:#666;" onclick="proveNextTestFree()">Draw Another Test (no turn cost)</button>' +
        '</div>';
      html += '<button class="override-btn" onclick="proveUndoOutcome()">Undo: change this outcome</button>';
    }
    return html;
  }

  // Outcome buttons
  html += '<div style="font-size:14px;color:#999;margin:14px 0 8px;">What was the result of this test?</div>';
  html += '<div class="ref-chips">';
  PROVE_OUTCOMES.forEach(o => {
    html += '<div class="ref-chip" style="border-color:' + o.color + ';color:' + o.color + ';" onclick="submitProveOutcome(\'' + o.key + '\')">' + o.label + '</div>';
  });
  html += '</div>';
  return html;
}

function assignRandomTest(g) {
  const available = TESTS.map((_, i) => i).filter(i => !g.testsUsed.includes(i));
  if (available.length === 0) {
    // Reset pool
    g.testsUsed = [];
    return assignRandomTest(g);
  }
  const pick = available[Math.floor(Math.random() * available.length)];
  g.currentTestIdx = pick;
  if (!g.testsUsed.includes(pick)) g.testsUsed.push(pick);
}

/* ── Tree stage ── */
function renderTreeStage(g) {
  let html = '<div class="stage-subtitle">Enter labelled bracket notation. The tree renders in real time.</div>';
  html += '<div class="tree-input-area">' +
    '<label>Bracket notation:</label>' +
    '<textarea id="bracketInput" placeholder="[S [NP [Det the] [N cat]] [VP [V sat]]]" spellcheck="false"></textarea>' +
    '<div class="parse-error" id="parseError"></div>' +
    '</div>';
  html += '<div class="canvas-wrap"><canvas id="treeCanvas" width="600" height="200"></canvas></div>';
  html += '<div class="actions">' +
    '<button class="act-btn btn-approve" onclick="treeApprove()">Approved</button>' +
    '<button class="act-btn btn-reject" onclick="treeReject()">Rejected</button>' +
    '</div>';
  return html;
}

/* ════════════════════════════════════════
   Game actions
   ════════════════════════════════════════ */
function activeGroup() { return state.groups[state.activeGroupIndex]; }

function advanceStage() {
  const g = activeGroup();
  g.currentTestIdx = null;
  g.testsUsed = [];
  g.bracketInput = "";
  // Preserve prove history before clearing
  if (g.stageIndex === 1 && g.proveHistory && g.proveHistory.length > 0) {
    g.provePhraseFinalHistory = g.proveHistory.slice();
  }
  if (g.stageIndex === 3 && g.proveHistory && g.proveHistory.length > 0) {
    g.proveFuncFinalHistory = g.proveHistory.slice();
  }
  g.lastAnswer = null;
  g.lastAnswerCorrect = null;
  g.proveOutcome = null;
  g.proveClaimed = false;
  g.proveHistory = [];
  if (g.stageIndex < 4) {
    g.stageIndex++;
  } else {
    g.completed = true;
  }
  render();
}

function submitIdentify(answer) {
  const g = activeGroup();
  const s = SENTENCES[g.sentenceIdx];
  const isPhrase = g.stageIndex === 0;
  const correctAnswer = isPhrase ? s.phraseType : s.function;
  // Normalize: "Complement" matches "Complement (inside NP)", etc.
  const isCorrect = answer === correctAnswer || correctAnswer.startsWith(answer + " (");

  g.turns++;
  g.lastAnswer = answer;
  g.lastAnswerCorrect = isCorrect;

  // Commit the answer when correct (Proceed still required to advance)
  if (isCorrect) {
    if (isPhrase) {
      g.committedPhraseType = answer;
      g.committedPhraseTypeOverride = false;
    } else {
      g.committedFunction = answer;
      g.committedFunctionOverride = false;
    }
  }
  render();
}

function overrideCorrect() {
  // Card was wrong — accept the student's answer and advance
  const g = activeGroup();
  const isPhrase = g.stageIndex === 0;
  if (isPhrase) {
    g.committedPhraseType = g.lastAnswer;
    g.committedPhraseTypeOverride = true;
  } else {
    g.committedFunction = g.lastAnswer;
    g.committedFunctionOverride = true;
  }
  g.lastAnswer = null;
  g.lastAnswerCorrect = null;
  advanceStage();
}

function overrideIncorrect() {
  // Card was wrong — the "correct" result was actually wrong, count as lost turn
  const g = activeGroup();
  g.lastAnswer = null;
  g.lastAnswerCorrect = null;
  render(); // stay on same stage, let them try again
}

function clearAnswer() {
  // After an incorrect answer, go back to the chip selection
  const g = activeGroup();
  g.lastAnswer = null;
  g.lastAnswerCorrect = null;
  render();
}

function submitProveOutcome(key) {
  const g = activeGroup();
  if (!g.proveHistory) g.proveHistory = [];
  const test = TESTS[g.currentTestIdx];
  // "not-applicable" doesn't cost a turn; everything else does
  if (key !== "not-applicable") g.turns++;
  g.proveOutcome = key;
  g.proveHistory.push({ testName: test.name, result: key });
  render();
}

function proveClaimDone() {
  // Students claim they have enough evidence
  const g = activeGroup();
  g.proveClaimed = true;
  g.proveOutcome = null;
  render();
}

function proveAcceptClaim() {
  // Instructor agrees — advance
  const g = activeGroup();
  g.proveClaimed = false;
  advanceStage();
}

function proveRejectClaim() {
  // Instructor disagrees — costs a turn, keep going
  const g = activeGroup();
  g.turns++;
  g.proveClaimed = false;
  g.proveOutcome = null;
  assignRandomTest(g);
  render();
}

function proveNextTest() {
  // Draw another test (turn already counted)
  const g = activeGroup();
  g.proveOutcome = null;
  assignRandomTest(g);
  render();
}

function proveNextTestFree() {
  // Draw another test after not-applicable (no turn cost)
  const g = activeGroup();
  g.proveOutcome = null;
  assignRandomTest(g);
  render();
}

function proveUndoOutcome() {
  // Undo the last outcome — reverse turn cost and history entry
  const g = activeGroup();
  if (g.proveOutcome && g.proveOutcome !== "not-applicable") {
    g.turns--; // refund the turn
  }
  if (g.proveHistory && g.proveHistory.length > 0) {
    g.proveHistory.pop();
  }
  g.proveOutcome = null;
  render();
}

function treeApprove() {
  activeGroup().turns++;
  advanceStage();
}

function treeReject() {
  activeGroup().turns++;
  render();
}

function drawSentenceCard() {
  const g = activeGroup();
  if (!state.usedSentences) state.usedSentences = [];
  const available = SENTENCES.map((_, i) => i).filter(i => !state.usedSentences.includes(i));
  if (available.length === 0) state.usedSentences = []; // reset pool if exhausted
  const pool = available.length > 0 ? available : SENTENCES.map((_, i) => i);
  const pick = pool[Math.floor(Math.random() * pool.length)];
  g.sentenceIdx = pick;
  state.usedSentences.push(pick);
  render();
}

function onBracketInput(e) {
  const g = activeGroup();
  g.bracketInput = e.target.value;
  save();
  drawTree(e.target.value);
}

/* ════════════════════════════════════════
   Bracket parser (recursive descent)
   ════════════════════════════════════════ */
function parseBrackets(input) {
  let pos = 0;
  const src = input.trim();

  function skipWS() { while (pos < src.length && /\s/.test(src[pos])) pos++; }

  function parseNode() {
    skipWS();
    if (pos >= src.length) return null;
    if (src[pos] === '[') {
      pos++; // consume '['
      skipWS();
      // Read label
      let label = "";
      while (pos < src.length && !/[\s\[\]]/.test(src[pos])) { label += src[pos]; pos++; }
      if (!label) label = "?";
      const children = [];
      skipWS();
      while (pos < src.length && src[pos] !== ']') {
        const child = parseNode();
        if (child) children.push(child);
        else break;
        skipWS();
      }
      if (pos < src.length && src[pos] === ']') pos++; // consume ']'
      return { label, children, terminal: false };
    } else if (src[pos] !== ']') {
      // Terminal word
      let word = "";
      while (pos < src.length && !/[\s\[\]]/.test(src[pos])) { word += src[pos]; pos++; }
      return { label: word, children: [], terminal: true };
    }
    return null;
  }

  // If input has no brackets, treat as a sequence of words
  if (!src.includes('[')) {
    const words = src.split(/\s+/).filter(w => w.length > 0);
    if (words.length === 0) return { tree: null, error: "" };
    if (words.length === 1) return { tree: { label: words[0], children: [], terminal: true }, error: "" };
    return {
      tree: {
        label: "",
        children: words.map(w => ({ label: w, children: [], terminal: true })),
        terminal: false,
      },
      error: "",
    };
  }

  const tree = parseNode();
  const error = (pos < src.length && src.substring(pos).trim().length > 0)
    ? "Unparsed input after position " + pos
    : "";
  return { tree, error };
}

/* ════════════════════════════════════════
   Tree renderer (Canvas)
   ════════════════════════════════════════ */
const TREE_CFG = {
  leafSpacing: 48,
  levelHeight: 50,
  paddingX: 24,
  paddingY: 20,
  fontSize: 14,
};

function layoutTree(node, depth, leafCounter) {
  if (!node) return leafCounter;
  node.depth = depth;
  if (node.children.length === 0) {
    node.leafX = leafCounter;
    return leafCounter + 1;
  }
  let counter = leafCounter;
  for (const ch of node.children) {
    counter = layoutTree(ch, depth + 1, counter);
  }
  // Center x over children
  const firstChild = node.children[0];
  const lastChild = node.children[node.children.length - 1];
  node.leafX = (firstChild.leafX + lastChild.leafX) / 2;
  return counter;
}

function getMaxDepth(node) {
  if (!node) return 0;
  if (node.children.length === 0) return node.depth;
  return Math.max(...node.children.map(getMaxDepth));
}

function drawTree(input) {
  const canvas = document.getElementById("treeCanvas");
  const errEl = document.getElementById("parseError");
  if (!canvas) return;
  const ctx = canvas.getContext("2d");

  const { tree, error } = parseBrackets(input);
  if (errEl) errEl.textContent = error;

  if (!tree) {
    canvas.width = 600; canvas.height = 60;
    ctx.clearRect(0, 0, 600, 60);
    ctx.fillStyle = "#999"; ctx.font = "14px sans-serif";
    ctx.textAlign = "center";
    ctx.fillText("Tree will appear here…", 300, 36);
    return;
  }

  const leafCount = layoutTree(tree, 0, 0);
  const maxDepth = getMaxDepth(tree);

  const W = Math.max(400, leafCount * TREE_CFG.leafSpacing + TREE_CFG.paddingX * 2);
  const H = (maxDepth + 1) * TREE_CFG.levelHeight + TREE_CFG.paddingY * 2;
  canvas.width = W;
  canvas.height = H;

  ctx.clearRect(0, 0, W, H);
  ctx.textAlign = "center";
  ctx.textBaseline = "middle";

  function nodeX(n) { return TREE_CFG.paddingX + n.leafX * TREE_CFG.leafSpacing; }
  function nodeY(n) { return TREE_CFG.paddingY + n.depth * TREE_CFG.levelHeight; }

  function drawNode(n) {
    const x = nodeX(n), y = nodeY(n);
    // Draw lines to children
    ctx.strokeStyle = "#555";
    ctx.lineWidth = 1.2;
    for (const ch of n.children) {
      ctx.beginPath();
      ctx.moveTo(x, y + 10);
      ctx.lineTo(nodeX(ch), nodeY(ch) - 10);
      ctx.stroke();
    }
    // Draw label (skip if empty — e.g. implicit root for plain words)
    if (n.label) {
      if (n.terminal) {
        ctx.font = "italic " + TREE_CFG.fontSize + "px serif";
        ctx.fillStyle = "#333";
      } else {
        ctx.font = "bold " + TREE_CFG.fontSize + "px sans-serif";
        ctx.fillStyle = "#111";
      }
      ctx.fillText(n.label, x, y);
    }

    for (const ch of n.children) drawNode(ch);
  }

  drawNode(tree);
}

/* ════════════════════════════════════════
   Review mode
   ════════════════════════════════════════ */
function setReviewStage(si) {
  const g = activeGroup();
  g.reviewStage = si;
  render();
}

function clearReviewStage() {
  const g = activeGroup();
  g.reviewStage = null;
  render();
}

function renderReviewStage(g, si) {
  const stage = STAGES[si];
  const s = g.sentenceIdx !== null ? SENTENCES[g.sentenceIdx] : null;
  let html = '<div class="review-section">';
  html += '<h3>' + stage.label + ': ' + stage.title + '</h3>';

  if (s) {
    html += '<div class="review-item"><span class="review-label">Sentence:</span> ' + s.sentence + '</div>';
    html += '<div class="review-item"><span class="review-label">Phrase:</span> ' + s.phrase + '</div>';
  }

  if (si === 0) {
    // Identify phrase type
    html += '<div class="review-item"><span class="review-label">Committed answer:</span> ' +
      (g.committedPhraseType || '—') +
      (g.committedPhraseTypeOverride ? ' <em style="color:#999;">(override)</em>' : '') + '</div>';
    if (s) {
      html += '<div class="review-item"><span class="review-label">Card answer:</span> ' + s.phraseType + '</div>';
    }
  } else if (si === 1) {
    // Prove phrase type
    html += '<div class="review-item"><span class="review-label">Proving:</span> ' +
      (g.committedPhraseType || '—') + '</div>';
    if (g.provePhraseFinalHistory && g.provePhraseFinalHistory.length > 0) {
      html += '<div class="review-item"><span class="review-label">Evidence:</span></div>';
      g.provePhraseFinalHistory.forEach(h => {
        const color = h.result === "positive" ? "#1d9e75" : h.result === "negative" ? "#c0392b" : "#666";
        const symbol = h.result === "positive" ? "+" : h.result === "negative" ? "−" : "○";
        html += '<div style="font-size:14px;color:' + color + ';padding:2px 0 2px 16px;">' + symbol + ' ' + h.testName + '</div>';
      });
    }
  } else if (si === 2) {
    // Identify function
    html += '<div class="review-item"><span class="review-label">Committed answer:</span> ' +
      (g.committedFunction || '—') +
      (g.committedFunctionOverride ? ' <em style="color:#999;">(override)</em>' : '') + '</div>';
    if (s) {
      html += '<div class="review-item"><span class="review-label">Card answer:</span> ' + s.function + '</div>';
    }
  } else if (si === 3) {
    // Prove function
    html += '<div class="review-item"><span class="review-label">Proving:</span> ' +
      (g.committedFunction || '—') + '</div>';
    if (g.proveFuncFinalHistory && g.proveFuncFinalHistory.length > 0) {
      html += '<div class="review-item"><span class="review-label">Evidence:</span></div>';
      g.proveFuncFinalHistory.forEach(h => {
        const color = h.result === "positive" ? "#1d9e75" : h.result === "negative" ? "#c0392b" : "#666";
        const symbol = h.result === "positive" ? "+" : h.result === "negative" ? "−" : "○";
        html += '<div style="font-size:14px;color:' + color + ';padding:2px 0 2px 16px;">' + symbol + ' ' + h.testName + '</div>';
      });
    }
  } else if (si === 4) {
    // Tree
    if (g.bracketInput) {
      html += '<div class="review-item"><span class="review-label">Bracket notation:</span></div>';
      html += '<div style="font-family:monospace;font-size:14px;color:#eee;background:#111;padding:10px;border-radius:6px;margin:8px 0;">' +
        g.bracketInput.replace(/</g, '&lt;') + '</div>';
      html += '<div class="canvas-wrap"><canvas id="treeCanvas" width="600" height="200"></canvas></div>';
    } else {
      html += '<div class="review-item" style="color:#666;font-style:italic;">No tree was entered.</div>';
    }
  }

  html += '</div>';
  return html;
}

/* ════════════════════════════════════════
   Leaderboard
   ════════════════════════════════════════ */
function showLeaderboard() {
  const sorted = state.groups.slice().sort((a, b) => {
    if (a.completed && !b.completed) return -1;
    if (!a.completed && b.completed) return 1;
    if (a.completed && b.completed) return a.turns - b.turns;
    return b.stageIndex - a.stageIndex || a.turns - b.turns;
  });

  const body = document.getElementById("lbBody");
  body.innerHTML = "";
  sorted.forEach((g, i) => {
    const statusText = g.completed
      ? "Summit — " + g.turns + " turns"
      : STAGES[g.stageIndex].label + " — " + g.turns + " turns";
    body.innerHTML += '<div class="lb-row">' +
      '<div class="lb-rank">' + (i + 1) + '</div>' +
      '<div class="lb-name" style="color:' + g.color + '">' + g.name + '</div>' +
      '<div class="lb-stat">' + statusText + '</div>' +
      '</div>';
  });

  document.getElementById("lbOverlay").classList.remove("hidden");
}

function closeLB() {
  document.getElementById("lbOverlay").classList.add("hidden");
}

/* ════════════════════════════════════════
   Reset
   ════════════════════════════════════════ */
function resetGame() {
  if (!confirm("Reset game and return to setup?")) return;
  localStorage.removeItem("proveItMountain");
  state = null;
  showSetup();
}

/* ════════════════════════════════════════
   Boot
   ════════════════════════════════════════ */
initSetup();
if (loadState()) {
  showGame();
} else {
  showSetup();
}
</script>
